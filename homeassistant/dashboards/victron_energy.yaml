# ==============================================================================
# VICTRON ENERGY DASHBOARD — Lovelace Configuration
# ==============================================================================
#
# PREREQUISITES (HACS Frontend):
#   - apexcharts-card (RomRider/apexcharts-card)
#   - button-card (custom-cards/button-card)
#
# INSTALLATION:
#   Option A — Add as a new dashboard:
#     1. Go to Settings → Dashboards → Add Dashboard → set to YAML mode
#     2. Point it to this file in configuration.yaml:
#          lovelace:
#            dashboards:
#              victron-energy:
#                mode: yaml
#                title: Victron Energy
#                icon: mdi:battery-charging
#                filename: dashboards/victron_energy.yaml
#
#   Option B — Add as a view to your existing dashboard:
#     1. Copy the content under "views:" into your existing dashboard config
#
# ENTITY ID PLACEHOLDERS — same 5 as in the package file:
#   sensor.YOUR_VICTRON_BATTERY_SOC
#   number.YOUR_VICTRON_GRID_SETPOINT
#   sensor.YOUR_VICTRON_GRID_POWER
#   sensor.YOUR_VICTRON_BATTERY_POWER
#   sensor.YOUR_EPEX_SPOT_PRICE
#
# ==============================================================================

# ------------------------------------------------------------------------------
# Button Card Template — reusable template for 24 hour-selector buttons
# Define this at the dashboard root level (same level as 'views')
# ------------------------------------------------------------------------------
button_card_templates:
  hour_btn:
    show_icon: false
    show_state: false
    styles:
      card:
        - padding: 6px 2px
        - font-size: 13px
        - font-weight: bold
        - min-height: 36px
        - border-radius: 6px
        - color: white
        - background: >
            [[[
              const h = variables.h.toString();
              const ch = (hass.states['input_text.victron_charge_hours']?.state || '').split(',').map(s=>s.trim());
              const dh = (hass.states['input_text.victron_discharge_hours']?.state || '').split(',').map(s=>s.trim());
              if (ch.includes(h)) return '#2E7D32';
              if (dh.includes(h)) return '#C62828';
              return 'var(--card-background-color, #444)';
            ]]]
        - border: >
            [[[
              return new Date().getHours() === variables.h
                ? '2px solid var(--primary-color, #03a9f4)'
                : '1px solid var(--divider-color, #555)';
            ]]]
    tap_action:
      action: call-service
      service: script.victron_toggle_hour
      service_data:
        hour: "[[[ return variables.h ]]]"

# ==============================================================================
# VIEWS
# ==============================================================================
views:
  - title: Victron Energy
    path: victron-energy
    icon: mdi:battery-charging
    cards:

      # ================================================================
      # 1. STATUS OVERVIEW
      # ================================================================
      - type: markdown
        content: >
          ## {% set action = states('sensor.victron_desired_action') %}{% if action == 'charge' %}🟢 Charging{% elif action == 'discharge' %}🔴 Discharging{% else %}⚪ Idle{% endif %}


          | | |
          |---|---|
          | **Mode** | {{ states('input_select.victron_control_mode') }} |
          | **Action** | {{ states('sensor.victron_desired_action') }} |
          | **Setpoint** | {{ states('sensor.victron_target_setpoint') }} W |
          | **SOC** | {{ states('sensor.YOUR_VICTRON_BATTERY_SOC') }}% |
          | **Price** | {{ states('sensor.YOUR_EPEX_SPOT_PRICE') }} ct/kWh |

      # ================================================================
      # 2. POWER GAUGES
      # ================================================================
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.YOUR_VICTRON_BATTERY_SOC
            name: Battery SOC
            unit: "%"
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 10
            needle: true

          - type: entity
            entity: sensor.YOUR_VICTRON_GRID_POWER
            name: Grid Power
            icon: mdi:transmission-tower

          - type: entity
            entity: sensor.YOUR_VICTRON_BATTERY_POWER
            name: Battery Power
            icon: mdi:battery-charging

          - type: entity
            entity: sensor.YOUR_EPEX_SPOT_PRICE
            name: Current Price
            icon: mdi:currency-eur

      # ================================================================
      # 3. EPEX PRICE CHART — color-coded by schedule
      # ================================================================
      - type: custom:apexcharts-card
        header:
          title: EPEX Spot Prices — Today
          show: true
        graph_span: 24h
        span:
          start: day
        apex_config:
          chart:
            type: bar
            stacked: true
            height: 250
          plotOptions:
            bar:
              columnWidth: "85%"
          tooltip:
            y:
              formatter: |
                EVAL:function(val) { return val !== null ? val.toFixed(2) + ' ct/kWh' : ''; }
          xaxis:
            labels:
              datetimeFormatter:
                hour: HH
          yaxis:
            - title:
                text: ct/kWh
              decimalsInFloat: 1
          legend:
            show: true
            position: bottom
        series:
          # --- Charge hours (green) ---
          - entity: sensor.YOUR_EPEX_SPOT_PRICE
            name: Charge
            type: column
            color: "#4CAF50"
            data_generator: |
              const data = entity.attributes.data || [];
              const ch = (hass.states['input_text.victron_charge_hours']?.state || '')
                .split(',').map(s => parseInt(s.trim())).filter(h => !isNaN(h));
              const today = new Date(); today.setHours(0,0,0,0);
              const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
              return data
                .filter(item => {
                  const d = new Date(item.start_time);
                  return d >= today && d < tomorrow && ch.includes(d.getHours());
                })
                .map(item => [new Date(item.start_time).getTime(), item.price_ct_per_kwh]);
          # --- Discharge hours (red) ---
          - entity: sensor.YOUR_EPEX_SPOT_PRICE
            name: Discharge
            type: column
            color: "#f44336"
            data_generator: |
              const data = entity.attributes.data || [];
              const dh = (hass.states['input_text.victron_discharge_hours']?.state || '')
                .split(',').map(s => parseInt(s.trim())).filter(h => !isNaN(h));
              const today = new Date(); today.setHours(0,0,0,0);
              const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
              return data
                .filter(item => {
                  const d = new Date(item.start_time);
                  return d >= today && d < tomorrow && dh.includes(d.getHours());
                })
                .map(item => [new Date(item.start_time).getTime(), item.price_ct_per_kwh]);
          # --- Idle hours (gray) ---
          - entity: sensor.YOUR_EPEX_SPOT_PRICE
            name: Idle
            type: column
            color: "#9E9E9E"
            data_generator: |
              const data = entity.attributes.data || [];
              const ch = (hass.states['input_text.victron_charge_hours']?.state || '')
                .split(',').map(s => parseInt(s.trim())).filter(h => !isNaN(h));
              const dh = (hass.states['input_text.victron_discharge_hours']?.state || '')
                .split(',').map(s => parseInt(s.trim())).filter(h => !isNaN(h));
              const today = new Date(); today.setHours(0,0,0,0);
              const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
              return data
                .filter(item => {
                  const d = new Date(item.start_time);
                  const h = d.getHours();
                  return d >= today && d < tomorrow && !ch.includes(h) && !dh.includes(h);
                })
                .map(item => [new Date(item.start_time).getTime(), item.price_ct_per_kwh]);

      # ================================================================
      # 4. HOUR SELECTOR GRID
      # ================================================================
      - type: markdown
        content: >
          **Schedule** — tap to cycle: idle → 🟢 charge → 🔴 discharge → idle

      # Row 1: Hours 00–05
      - type: horizontal-stack
        cards:
          - type: custom:button-card
            template: hour_btn
            name: "00"
            variables:
              h: 0
          - type: custom:button-card
            template: hour_btn
            name: "01"
            variables:
              h: 1
          - type: custom:button-card
            template: hour_btn
            name: "02"
            variables:
              h: 2
          - type: custom:button-card
            template: hour_btn
            name: "03"
            variables:
              h: 3
          - type: custom:button-card
            template: hour_btn
            name: "04"
            variables:
              h: 4
          - type: custom:button-card
            template: hour_btn
            name: "05"
            variables:
              h: 5

      # Row 2: Hours 06–11
      - type: horizontal-stack
        cards:
          - type: custom:button-card
            template: hour_btn
            name: "06"
            variables:
              h: 6
          - type: custom:button-card
            template: hour_btn
            name: "07"
            variables:
              h: 7
          - type: custom:button-card
            template: hour_btn
            name: "08"
            variables:
              h: 8
          - type: custom:button-card
            template: hour_btn
            name: "09"
            variables:
              h: 9
          - type: custom:button-card
            template: hour_btn
            name: "10"
            variables:
              h: 10
          - type: custom:button-card
            template: hour_btn
            name: "11"
            variables:
              h: 11

      # Row 3: Hours 12–17
      - type: horizontal-stack
        cards:
          - type: custom:button-card
            template: hour_btn
            name: "12"
            variables:
              h: 12
          - type: custom:button-card
            template: hour_btn
            name: "13"
            variables:
              h: 13
          - type: custom:button-card
            template: hour_btn
            name: "14"
            variables:
              h: 14
          - type: custom:button-card
            template: hour_btn
            name: "15"
            variables:
              h: 15
          - type: custom:button-card
            template: hour_btn
            name: "16"
            variables:
              h: 16
          - type: custom:button-card
            template: hour_btn
            name: "17"
            variables:
              h: 17

      # Row 4: Hours 18–23
      - type: horizontal-stack
        cards:
          - type: custom:button-card
            template: hour_btn
            name: "18"
            variables:
              h: 18
          - type: custom:button-card
            template: hour_btn
            name: "19"
            variables:
              h: 19
          - type: custom:button-card
            template: hour_btn
            name: "20"
            variables:
              h: 20
          - type: custom:button-card
            template: hour_btn
            name: "21"
            variables:
              h: 21
          - type: custom:button-card
            template: hour_btn
            name: "22"
            variables:
              h: 22
          - type: custom:button-card
            template: hour_btn
            name: "23"
            variables:
              h: 23

      # ================================================================
      # 5. MODE CONTROLS
      # ================================================================
      - type: entities
        title: Controls
        show_header_toggle: false
        entities:
          - entity: input_select.victron_control_mode
            name: Control Mode
          - entity: input_boolean.victron_charge_allowed
            name: Charge Allowed
          - entity: input_boolean.victron_discharge_allowed
            name: Discharge Allowed
          - type: divider
          - entity: sensor.victron_desired_action
            name: Current Action
          - entity: sensor.victron_target_setpoint
            name: Target Setpoint
          - entity: number.YOUR_VICTRON_GRID_SETPOINT
            name: Actual Grid Setpoint

      # ================================================================
      # 6. SOC LIMITS
      # ================================================================
      - type: entities
        title: SOC Limits
        show_header_toggle: false
        entities:
          - entity: input_number.victron_min_soc
            name: Min SOC
          - entity: input_number.victron_max_soc
            name: Max SOC

      # ================================================================
      # 7. POWER & SETPOINT CONFIGURATION
      # ================================================================
      - type: entities
        title: Power Configuration
        show_header_toggle: false
        entities:
          - entity: input_number.victron_charge_power
            name: Charge Power
          - entity: input_number.victron_discharge_power
            name: Discharge Power
          - entity: input_number.victron_idle_setpoint
            name: Idle Setpoint
          - type: divider
          - entity: input_number.victron_min_grid_setpoint
            name: Min Grid Setpoint
          - entity: input_number.victron_max_grid_setpoint
            name: Max Grid Setpoint

      # ================================================================
      # 8. AUTO MODE PARAMETERS
      # ================================================================
      - type: entities
        title: Auto Mode Settings
        show_header_toggle: false
        entities:
          - entity: input_number.victron_cheapest_hours
            name: "# Cheapest Hours to Charge"
          - entity: input_number.victron_expensive_hours
            name: "# Expensive Hours to Discharge"
          - entity: input_number.victron_charge_price_threshold
            name: Charge Price Threshold
          - entity: input_number.victron_discharge_price_threshold
            name: Discharge Price Threshold

      # ================================================================
      # 9. CURRENT SCHEDULE (raw view for debugging)
      # ================================================================
      - type: entities
        title: Current Schedule
        show_header_toggle: false
        entities:
          - entity: input_text.victron_charge_hours
            name: Charge Hours
          - entity: input_text.victron_discharge_hours
            name: Discharge Hours

      # ================================================================
      # 10. MANUAL ACTIONS
      # ================================================================
      - type: horizontal-stack
        cards:
          - type: button
            name: Recalculate Schedule
            icon: mdi:calculator
            tap_action:
              action: call-service
              service: script.victron_calculate_schedule
          - type: button
            name: Clear Schedule
            icon: mdi:delete
            tap_action:
              action: call-service
              service: input_text.set_value
              target:
                entity_id:
                  - input_text.victron_charge_hours
                  - input_text.victron_discharge_hours
              data:
                value: ""
