name: CI

permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  validation:
    uses: ./.github/workflows/hacs.yml
  tests:
    uses: ./.github/workflows/tests.yml
  frontend:
    name: Build frontend card
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build card
        run: npm run build
        working-directory: frontend
      - name: Verify artifact
        run: |
          test -f custom_components/victron_charge_control/static/victron-charge-controller-card.js
          echo "Built card size: $(stat -c%s custom_components/victron_charge_control/static/victron-charge-controller-card.js) bytes"