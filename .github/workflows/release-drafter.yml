name: Release Drafter

on:
  push:
    # branches to consider in the event; optional, defaults to all
    branches:
      - main
      - master
    tags:
      - "v*"

  # pull_request event is required only for autolabeler
  pull_request:
    # Only following types are handled by the action, but one can default to all as well
    types: [opened, reopened, synchronize]
  # pull_request_target event is required for autolabeler to support PRs from forks
  # pull_request_target:
  #   types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_full_release_draft:
    permissions:
      # write permission is required to create a github release
      contents: write
      # write permission is required for autolabeler
      # otherwise, read permission is required at least
      pull-requests: write
    runs-on: ubuntu-latest
    outputs:
      resolved_version: ${{ steps.release_drafter.outputs.resolved_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: release_drafter
        uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commitish: main
          prerelease: false

      - name: Create Home Assistant release archive
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
            cd custom_components/victron_charge_control
            zip -r ${{ github.workspace }}/victron_charge_control.zip ./  

      - name: Upload release asset (replace if exists)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release_drafter.outputs.tag_name }}" \
            "${{ github.workspace }}/victron_charge_control.zip" \
            --clobber
  update_pre_release_draft:
    needs: update_full_release_draft
    permissions:
      # write permission is required to create a github release
      contents: write
      # write permission is required for autolabeler
      # otherwise, read permission is required at least
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Compute pre-release version
        id: pre_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE: ${{ needs.update_full_release_draft.outputs.resolved_version }}
        run: |
          # Find the latest rc tag for this base version (draft or published)
          LATEST=$(gh release list --limit 50 --json tagName,isDraft \
            | jq --arg prefix "v${BASE}-rc." \
            '[.[] | select(.tagName | startswith($prefix))] | sort_by(.tagName) | last')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "version=${BASE}-rc.0" >> "$GITHUB_OUTPUT"
          else
            TAG=$(echo "$LATEST" | jq -r '.tagName')
            IS_DRAFT=$(echo "$LATEST" | jq -r '.isDraft')
            RC_NUM=$(echo "$TAG" | sed 's/.*-rc\.//')
            if [ "$IS_DRAFT" = "true" ]; then
              echo "version=${BASE}-rc.${RC_NUM}" >> "$GITHUB_OUTPUT"
            else
              echo "version=${BASE}-rc.$((RC_NUM + 1))" >> "$GITHUB_OUTPUT"
            fi
          fi
      - id: release_drafter
        uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commitish: main
          version: ${{ steps.pre_version.outputs.version }}
          prerelease: true
          prerelease-identifier: "rc"

      - name: Create Home Assistant release archive
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
            cd custom_components/victron_charge_control
            zip -r ${{ github.workspace }}/victron_charge_control.zip ./  

      - name: Upload release asset (replace if exists)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release_drafter.outputs.tag_name }}" \
            "${{ github.workspace }}/victron_charge_control.zip" \
            --clobber